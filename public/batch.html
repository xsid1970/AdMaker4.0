<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배치 관리 시스템 - AdMaker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #8b5cf6;
            --secondary: #ec4899;
            --accent: #10b981;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Pretendard', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-area img {
            height: 40px;
        }

        .logo-area h1 {
            margin: 0;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
            filter: brightness(1.1);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .main-content {
            padding: 40px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            perspective: 1000px;
        }

        .batch-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.8s ease backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px) rotateX(-10deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        .batch-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(139, 92, 246, 0.2);
        }

        .thumb-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #1e293b;
            position: relative;
            overflow: hidden;
        }

        .thumb-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.5s ease;
        }

        .batch-card:hover .thumb-wrapper img {
            transform: scale(1.1);
        }

        .info-area {
            padding: 20px;
        }

        .info-area h3 {
            margin: 0 0 8px 0;
            font-size: 1.1rem;
            color: #fff;
        }

        .info-area p {
            margin: 0;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .batch-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(16, 185, 129, 0.8);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            backdrop-filter: blur(4px);
        }

        /* Shuffle Animation */
        .shuffling {
            pointer-events: none;
        }
        
        .shuffling .batch-card {
            transform: scale(0.8) rotateY(180deg);
            opacity: 0;
        }

        .empty-state {
            text-align: center;
            padding: 100px 0;
            color: #64748b;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        /* Responsive Columns */
        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
            header {
                padding: 15px 20px;
            }
            .main-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <img src="/uploads/logo.png" alt="AdMaker Logo">
        <h1>배치 관리 시스템</h1>
    </div>
    <div class="controls">
        <button class="btn btn-outline" onclick="location.href='/'">🔙 로그인 화면</button>
        <button class="btn btn-primary" onclick="rotatePositions()">🔄 위치 순환 (랜덤 배치)</button>
    </div>
</header>

<div class="main-content">
    <div id="batchGrid" class="grid-container">
        <!-- Javascript will populate this -->
    </div>
    <div id="emptyState" class="empty-state" style="display:none;">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        <h3>표시할 배치 작업물이 없습니다.</h3>
        <p>편집기에서 '배치 대상'으로 지정하여 저장해 주세요.</p>
    </div>
</div>

<script>
    let batchItems = [];

    async function loadBatchItems() {
        const grid = document.getElementById('batchGrid');
        const empty = document.getElementById('emptyState');
        
        try {
            const res = await fetch('/api/ads?tag=배치');
            batchItems = await res.json();
            
            if (batchItems.length === 0) {
                grid.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            
            empty.style.display = 'none';
            renderGrid();
        } catch (err) {
            console.error('Failed to load batch items:', err);
        }
    }

    function renderGrid() {
        const grid = document.getElementById('batchGrid');
        grid.innerHTML = '';
        
        batchItems.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'batch-card';
            card.style.animationDelay = `${index * 0.1}s`;
            
            card.innerHTML = `
                <div class="batch-badge">BATCH #${item.id}</div>
                <div class="thumb-wrapper">
                    <img src="${item.thumbnail_base64}" alt="${item.company}">
                </div>
                <div class="info-area">
                    <h3>${item.company}</h3>
                    <p>${item.created_at.split(' ')[0]} | ${item.name || '담당자 미지정'}</p>
                </div>
            `;
            
            grid.appendChild(card);
        });
    }

    function rotatePositions() {
        if (batchItems.length < 2) return;
        
        const grid = document.getElementById('batchGrid');
        grid.classList.add('shuffling');
        
        // Shuffle the array
        setTimeout(() => {
            for (let i = batchItems.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [batchItems[i], batchItems[j]] = [batchItems[j], batchItems[i]];
            }
            
            renderGrid();
            
            setTimeout(() => {
                grid.classList.remove('shuffling');
            }, 100);
        }, 600);
    }

    document.addEventListener('DOMContentLoaded', loadBatchItems);
</script>

</body>
</html>
