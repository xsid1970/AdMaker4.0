<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인 - 통영.거제교차로 기획광고 편집기</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0; padding: 0; height: 100vh; display: flex; 
    font-family: 'Noto Sans KR', sans-serif;
    background: url('/uploads/cat_bg.jpg') center/cover no-repeat;
    align-items: center; justify-content: center;
    overflow: hidden;
  }
  .overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
  }
  .login-container {
    position: relative; width: 440px; background: rgba(255,255,255,0.85);
    border-radius: 24px; padding: 40px; padding-top: 50px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    backdrop-filter: blur(15px); border: 2px solid rgba(255,255,255,0.4);
    z-index: 10; text-align: center; transition: all 0.3s ease;
  }
  .cat-avatar {
    position: absolute; top: -65px; right: -75px;
    width: 130px; height: 130px; border-radius: 50%;
    border: 4px solid #fff;
    background: url('/uploads/cat_bg.jpg') center/cover;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: pointer; z-index: 50;
  }
  .cat-avatar:hover { transform: scale(1.25) rotate(15deg); }
  h1 { margin: 20px 0 10px; font-weight: 900; color: #2c3e50; font-size: 28px; }
  h1 span { color: #ff6b6b; font-family: 'Outfit', sans-serif; font-size: 36px; }
  p.subtitle { color: #7f8c8d; margin-bottom: 30px; font-size: 14px; font-weight: 500;}
  
  .input-group { margin-bottom: 18px; text-align: left; }
  .input-group label { display: block; font-size: 13px; font-weight: 700; color: #555; margin-bottom: 6px; }
  .input-group input { 
    width: 100%; padding: 15px; border: 2px solid #ddd; 
    border-radius: 12px; box-sizing: border-box; font-size: 15px; transition: 0.3s; 
    background: rgba(255,255,255,0.9); font-family: inherit;
  }
  .input-group input:focus { border-color: #ff6b6b; outline: none; box-shadow: 0 0 15px rgba(255,107,107,0.3); background: #fff;}
  
  .btn-huge {
    width: 100%; padding: 20px; border: none; border-radius: 14px; 
    font-size: 18px; font-weight: 900; cursor: pointer; transition: all 0.3s;
    margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px;
    letter-spacing: -0.5px;
  }
  .btn-admin { background: linear-gradient(135deg, #6c5ce7, #8e44ad); color: white; box-shadow: 0 10px 20px rgba(108,92,231,0.3); }
  .btn-admin:hover { transform: translateY(-4px); box-shadow: 0 15px 25px rgba(108,92,231,0.5); }
  .btn-emp { background: linear-gradient(135deg, #0984e3, #3498db); color: white; box-shadow: 0 10px 20px rgba(9,132,227,0.3); }
  .btn-emp:hover { transform: translateY(-4px); box-shadow: 0 15px 25px rgba(9,132,227,0.5); }
  
  .auth-links { margin-top: 25px; font-size: 13px; color: #7f8c8d; display: flex; justify-content: center; gap: 20px; }
  .auth-links a { color: #ff6b6b; text-decoration: none; font-weight: bold; cursor: pointer; transition: 0.2s;}
  .auth-links a:hover { color: #e74c3c; text-decoration: underline; }
  
  .panel { display: none; animation: fadeIn 0.4s ease forwards; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

  .btn-sub { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 900; background: #2ecc71; color: white; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.2s; box-shadow: 0 10px 20px rgba(46,204,113,0.3); }
  .btn-sub:hover { background: #27ae60; transform: translateY(-2px); box-shadow: 0 15px 25px rgba(46,204,113,0.4); }

  /* Small wandering cat */
  #catMover { position: absolute; bottom: 80px; right: 80px; z-index: 50; cursor: move; }
  .cat-container {
    position: relative;
    animation: floatBig 7s ease-in-out infinite;
  }
  .wandering-cat {
    width: 200px; height: 200px;
    background: url('/uploads/cat_bg.jpg') center/cover;
    border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    border: 5px solid rgba(255,255,255,0.8);
    animation: morph 10s ease-in-out infinite; opacity: 0.95;
    transition: transform 0.3s;
  }
  .wandering-cat:hover { transform: scale(1.1); }
  
  .cat-speech-bubble {
    position: absolute; bottom: 180px; right: 60px;
    background: white; border-radius: 25px; padding: 15px 25px;
    font-size: 18px; font-weight: 900; color: #ff6b6b; z-index: 100;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    opacity: 0; transform: translateY(20px) scale(0.8);
    transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    white-space: nowrap; pointer-events: none; border: 3px solid #ff6b6b;
  }
  .cat-speech-bubble::after {
    content: ''; position: absolute; bottom: -12px; right: 50px;
    border-width: 14px 14px 0 0; border-style: solid;
    border-color: #ff6b6b transparent transparent transparent;
  }
  .cat-speech-bubble.show { opacity: 1; transform: translateY(0) scale(1); }

  @keyframes floatBig {
    0% { transform: translateY(0) translateX(0) rotate(0deg); }
    33% { transform: translateY(-60px) translateX(-30px) rotate(12deg); }
    66% { transform: translateY(-20px) translateX(25px) rotate(-10deg); }
    100% { transform: translateY(0) translateX(0) rotate(0deg); }
  }
  @keyframes morph {
    0% { border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%; }
    50% { border-radius: 54% 46% 38% 62% / 49% 54% 46% 51%; }
    100% { border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%; }
  }
  .bg-text {
    position: absolute; top: 40px; left: 60px; z-index: 1; pointer-events: none; user-select: none; opacity: 0.15;
  }
  .bg-text img { height: 180px; }
</style>
</head>
<body>
<div class="overlay"></div>
<div class="bg-text"><img src="/uploads/logo.png"></div>

<!-- Tiny fun blob -->
<div id="catMover">
    <div class="cat-container">
        <div class="cat-speech-bubble" id="catMsg"></div>
        <div class="wandering-cat" title="야옹! 이동시켜봐라냥!"></div>
    </div>
</div>

<div class="login-container">
    
    <div id="panel-login" class="panel active">
        <div style="position: relative; display: inline-block; margin-bottom: 10px;">
            <img src="/uploads/logo.png" style="height: 55px; display: block;">
            <div id="logoAvatar" class="cat-avatar" title="야옹! 나를 드래그해봐라냥!"></div>
        </div>
        <h1 style="margin-top:0; font-size:26px; background: linear-gradient(135deg, #8e44ad, #ff6b6b); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">기획광고 편집</h1>
        
        <div class="input-group">
            <label>아이디</label>
            <input type="text" id="loginId" placeholder="계정 아이디를 입력하세요">
        </div>
        <div class="input-group">
            <label>비밀번호</label>
            <input type="password" id="loginPw" placeholder="비밀번호를 입력하세요" onkeyup="if(event.key==='Enter') doLogin('employee')">
        </div>
        
        <div style="margin-top: 25px;">
            <button class="btn-huge btn-admin" onclick="doLogin('admin')">🛠️ 관리자 화면으로 진입</button>
            <button class="btn-huge btn-emp" onclick="doLogin('employee')">🖥️ 직원 화면으로 진입</button>
        </div>
        
        <div class="auth-links">
            <a onclick="switchPanel('panel-register')">👤 직원 계정 등록하기</a>
            <a onclick="switchPanel('panel-change-pw')">🔐 비밀번호 변경</a>
        </div>
    </div>
    
    <div id="panel-register" class="panel">
        <h1 style="margin-top: 10px;">신규 계정 등록</h1>
        <p class="subtitle">새로운 직원용 아이디를 생성합니다.</p>
        <div class="input-group">
            <label>신규 아이디</label>
            <input type="text" id="regId" placeholder="원하는 아이디 입력">
        </div>
        <div class="input-group">
            <label>새 비밀번호</label>
            <input type="password" id="regPw" placeholder="안전한 비밀번호 입력">
        </div>
        <div style="margin-top: 25px;">
            <button class="btn-sub" onclick="doRegister()">✨ 가입 완료하기</button>
        </div>
        <div class="auth-links"><a onclick="switchPanel('panel-login')">🔙 로그인 화면으로 돌아가기</a></div>
    </div>

    <div id="panel-change-pw" class="panel">
        <h1 style="margin-top: 10px;">비밀번호 변경</h1>
        <p class="subtitle">기존 정보를 확인하고 비밀번호를 변경합니다.</p>
        <div class="input-group">
            <label>아이디</label>
            <input type="text" id="pwId" placeholder="가입된 아이디">
        </div>
        <div class="input-group">
            <label>현재 비밀번호</label>
            <input type="password" id="pwOld" placeholder="기존 비밀번호 입력">
        </div>
        <div class="input-group">
            <label>새 비밀번호</label>
            <input type="password" id="pwNew" placeholder="변경할 비밀번호 입력">
        </div>
        <div style="margin-top: 25px;">
            <button class="btn-sub" style="background: linear-gradient(135deg, #e67e22, #d35400);" onclick="doChangePw()">🔄 비밀번호 변경 적용</button>
        </div>
        <div class="auth-links"><a onclick="switchPanel('panel-login')">🔙 로그인 화면으로 돌아가기</a></div>
    </div>
</div>

<script>
    const catMsgs = ["편집기 접속 환영한다냥!!", "오늘도 멋지게 만들어보자냥^^V", "광고 편집은 내게 맡겨라냥!", "커피 한 잔 하며 여유롭게~", "보고싶었다냥~"];
    function showCatMsg(force = false) {
        const bubble = document.getElementById('catMsg');
        if (!bubble || (bubble.classList.contains('show') && !force)) return;
        const msg = catMsgs[Math.floor(Math.random() * catMsgs.length)];
        bubble.innerText = msg;
        bubble.classList.add('show');
        setTimeout(() => bubble.classList.remove('show'), 3500);
    }
    // 로그인 창에서는 아이디가 아직 없으므로 기본 랜덤 인사말
    setInterval(() => showCatMsg(), 10000);
    setTimeout(() => showCatMsg(true), 1500);

    function makeDraggable(el, clickCallback) {
        if(!el) return;
        let isDragging = false, hasMoved = false, startX, startY, initLeft, initTop;

        el.onmousedown = function(e) {
            e.preventDefault();
            isDragging = true; hasMoved = false;
            startX = e.clientX; startY = e.clientY;
            initLeft = el.offsetLeft; 
            initTop = el.offsetTop;
            
            const dragMouseMove = (e) => {
                if (!isDragging) return;
                const dx = e.clientX - startX, dy = e.clientY - startY;
                if(Math.abs(dx) > 5 || Math.abs(dy) > 5) hasMoved = true;
                if(hasMoved) {
                    el.style.right = 'auto'; el.style.bottom = 'auto';
                    el.style.left = (initLeft + dx) + 'px';
                    el.style.top = (initTop + dy) + 'px';
                }
            };
            const dragMouseUp = (e) => {
                isDragging = false;
                document.removeEventListener('mousemove', dragMouseMove);
                document.removeEventListener('mouseup', dragMouseUp);
                if(!hasMoved && clickCallback) clickCallback(el);
            };
            document.addEventListener('mousemove', dragMouseMove);
            document.addEventListener('mouseup', dragMouseUp);
        };
    }

    function initCatDrag() {
        makeDraggable(document.getElementById('catMover'), () => showCatMsg(true));
        makeDraggable(document.getElementById('logoAvatar'), (el) => {
            el.style.transform='scale(1.4) rotate(360deg)';
            setTimeout(()=>el.style.transform='',700);
        });
    }
    setTimeout(initCatDrag, 500);

    function switchPanel(panelId) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(panelId).classList.add('active');
    }

    async function doLogin(targetRole) {
        const id = document.getElementById('loginId').value.trim();
        const pw = document.getElementById('loginPw').value.trim();
        if(!id || !pw) return alert('아이디와 비밀번호를 모두 입력해주세요.');
        
        try {
            const res = await fetch('/api/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, password: pw })
            });
            const data = await res.json();
            
            if(data.success) {
                if(targetRole === 'admin' && data.role !== 'admin') {
                    return alert('⛔ 권한이 부족합니다. 관리자 전용 메뉴입니다.');
                }
                
                // localStorage에 인증 마크인 토큰 저장
                localStorage.setItem('v8_user_id', id);
                localStorage.setItem('v8_user_role', data.role);
                
                if(targetRole === 'admin') window.location.href = '/admin.html';
                else window.location.href = '/index.html';
            } else {
                alert(data.message);
            }
        } catch(err) {
            alert('로그인 처리 중 오류가 발생했습니다.');
        }
    }

    async function doRegister() {
        const id = document.getElementById('regId').value.trim();
        const pw = document.getElementById('regPw').value.trim();
        if(!id || !pw) return alert('모든 칸을 입력해주세요.');
        
        try {
            const res = await fetch('/api/register', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, password: pw })
            });
            const data = await res.json();
            alert(data.message);
            if(data.success) {
                document.getElementById('loginId').value = id;
                document.getElementById('loginPw').value = '';
                switchPanel('panel-login');
            }
        } catch(err) {
            alert('회원가입 처리 중 오류가 발생했습니다.');
        }
    }

    async function doChangePw() {
        const id = document.getElementById('pwId').value.trim();
        const oldPassword = document.getElementById('pwOld').value.trim();
        const newPassword = document.getElementById('pwNew').value.trim();
        if(!id || !oldPassword || !newPassword) return alert('모든 정보를 입력해주세요.');
        
        try {
            const res = await fetch('/api/change-password', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, oldPassword, newPassword })
            });
            const data = await res.json();
            alert(data.message);
            if(data.success) {
                document.getElementById('pwOld').value = '';
                document.getElementById('pwNew').value = '';
                switchPanel('panel-login');
            }
        } catch(err) {
            alert('비밀번호 변경 처리 중 오류가 발생했습니다.');
        }
    }
</script>
</body>
</html>
